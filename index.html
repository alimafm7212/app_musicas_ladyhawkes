<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Ladyhawkes — Content Factory</title>
<style>
:root{
  --ink:#0a0d14; --card:#131720; --edge:#1e2535;
  --paper:#E0D8CC; --gold:#C9883A; --gold-dark:#a86e28;
  --silver:#8BA7C9; --muted:#8a8a9a; --field:#0d1018;
  --accent-text:#0d0d0d;
  --mono:"Courier New",Courier,monospace;
}
html.light{
  --ink:#e8e4dd; --card:#f3f0e8; --edge:#c8c0b0;
  --paper:#1a1624; --gold:#a86e28; --gold-dark:#8a5820;
  --silver:#3a5a7a; --muted:#6a6875; --field:#faf7f0;
}
html.light body{
  background-image:
    radial-gradient(ellipse at top,rgba(169,110,40,.06),transparent 60%),
    repeating-linear-gradient(0deg,rgba(0,0,0,.022) 0px,rgba(0,0,0,.022) 1px,transparent 1px,transparent 3px);
}
*{box-sizing:border-box;}
html,body{margin:0;background:var(--ink);}
body{
  color:var(--paper);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
  background-image:
    radial-gradient(ellipse at top,rgba(201,136,58,.05),transparent 60%),
    repeating-linear-gradient(0deg,rgba(255,255,255,.01) 0px,rgba(255,255,255,.01) 1px,transparent 1px,transparent 3px);
  min-height:100vh;
}
::selection{background:var(--gold);color:var(--accent-text);}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:var(--edge);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}

.wrap{max-width:1100px;margin:0 auto;padding:24px 20px 48px;}

header{
  display:flex;flex-wrap:wrap;gap:16px;
  align-items:flex-end;justify-content:space-between;
  padding-bottom:20px;border-bottom:1px solid var(--edge);
}
.kicker{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10px;letter-spacing:.35em;
  color:var(--muted);margin-bottom:6px;
}
h1{font-family:var(--mono);font-size:30px;line-height:1;color:var(--paper);letter-spacing:.04em;margin:0;}
.sub{font-family:var(--mono);color:var(--gold);font-size:14px;letter-spacing:.4em;margin-top:6px;}

.archive-zone{position:relative;}
.archive-panel{
  position:absolute;right:0;top:calc(100% + 4px);width:300px;
  background:var(--card);border:1px solid var(--edge);z-index:30;
  box-shadow:0 18px 40px rgba(0,0,0,.6);display:none;
  max-height:60vh;overflow:auto;
}
.archive-panel.open{display:block;}
.archive-item{
  width:100%;text-align:left;padding:10px 12px;
  border:none;border-bottom:1px solid var(--edge);background:transparent;
  color:var(--paper);cursor:pointer;
}
.archive-item:hover{background:var(--ink);}
.archive-item .t{font-family:var(--mono);color:var(--gold);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.archive-item .m{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.archive-empty{padding:16px 12px;font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;}
.archive-clear{width:100%;padding:8px;background:transparent;border:none;color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.2em;cursor:pointer;}
.archive-clear:hover{color:var(--gold);}

.panel{background:var(--card);border:1px solid var(--edge);margin-top:24px;padding:20px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.full{grid-column:1 / -1;}
@media(max-width:640px){.grid2{grid-template-columns:1fr;}}

label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--muted);margin-bottom:6px;}
label .count{float:right;}
label .count.max{color:var(--gold);}
label .dim{color:var(--edge);}

.field{
  width:100%;background:var(--field);border:1px solid var(--edge);
  color:var(--paper);padding:9px 11px;font-size:14px;font-family:inherit;
  transition:border-color .15s,box-shadow .15s;
}
textarea.field{resize:none;}
select.field,.field.mono{font-family:var(--mono);}
.field:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,136,58,.35);}
.field::placeholder{color:#5c574e;}

.keyrow{display:flex;gap:8px;}
.ghostbtn{
  background:var(--field);border:1px solid var(--edge);color:var(--muted);
  font-family:var(--mono);font-size:10px;letter-spacing:.2em;padding:0 14px;cursor:pointer;
}
.ghostbtn:hover{color:var(--gold);}

.actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;}
.btn-primary{
  flex:1 1 auto;font-family:var(--mono);font-size:14px;letter-spacing:.25em;
  padding:13px;cursor:pointer;background:var(--gold);border:1px solid var(--gold);color:var(--accent-text);
  transition:background .15s,border-color .15s;
}
.btn-primary:hover{background:var(--gold-dark);border-color:var(--gold-dark);}
.btn-primary:disabled{background:var(--card);border-color:var(--edge);color:var(--muted);cursor:not-allowed;}
.btn-outline{
  font-family:var(--mono);font-size:14px;letter-spacing:.18em;padding:13px 22px;cursor:pointer;
  background:transparent;border:1px solid var(--edge);color:var(--paper);transition:border-color .15s,color .15s;
}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-outline:disabled{color:var(--muted);opacity:.4;cursor:not-allowed;border-color:var(--edge);}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:16px;margin-top:24px;}
@media(max-width:820px){.cards{grid-template-columns:1fr;}}
.tabbar{display:flex;flex-wrap:wrap;gap:4px;margin-top:24px;border-bottom:1px solid var(--edge);}
.tab{background:transparent;border:1px solid var(--edge);border-bottom:none;color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.12em;padding:9px 16px;cursor:pointer;transition:color .15s;}
.tab:hover{color:var(--paper);}
.tab.active{color:var(--gold);border-color:var(--gold);background:var(--card);position:relative;top:1px;}
.tabpanel.cards{margin-top:16px;}
.tabpanel.hidden{display:none;}
.queue-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
.queue-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--edge);background:var(--field);font-size:13px;}
.queue-item.done{opacity:.55;}
.queue-item.current{border-color:var(--gold);}
.qstatus{font-family:var(--mono);font-size:11px;width:80px;flex:0 0 auto;letter-spacing:.04em;}
.qstatus.pending{color:var(--muted);}
.qstatus.current{color:var(--gold);}
.qstatus.done{color:#7BA05B;}
.qtheme{flex:1;color:var(--paper);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qtype{font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 5px;border-radius:3px;background:var(--silver);color:var(--ink);margin-right:2px;flex-shrink:0;}
.card{background:var(--card);border:1px solid var(--edge);display:flex;flex-direction:column;min-height:280px;}
.card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:12px 16px;border-bottom:1px solid var(--edge);}
.card-title{font-family:var(--mono);color:var(--gold);font-size:14px;letter-spacing:.18em;display:flex;gap:8px;align-items:center;}
.card-title .num{color:var(--muted);}
.card-sub{font-size:11px;color:var(--muted);margin-top:3px;}
.card-actions{display:flex;gap:8px;flex-shrink:0;}
.card-body{flex:1;display:flex;flex-direction:column;padding:12px;}
.minibtn{
  font-family:var(--mono);font-size:10px;letter-spacing:.15em;padding:4px 10px;cursor:pointer;
  background:transparent;border:1px solid var(--edge);color:var(--paper);transition:border-color .15s,color .15s;
}
.minibtn:hover{border-color:var(--gold);color:var(--gold);}
.minibtn.on{border-color:var(--gold);color:var(--gold);}
.minibtn:disabled{color:var(--muted);opacity:.4;cursor:not-allowed;}
.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-align:center;}
textarea.output{flex:1;min-height:200px;width:100%;background:var(--field);border:1px solid var(--edge);color:var(--paper);padding:12px;font-family:var(--mono);font-size:13px;line-height:1.6;resize:none;}
.warn{background:rgba(201,136,58,0.12);border:1px solid var(--gold);color:var(--gold);font-family:var(--mono);font-size:11px;padding:6px 9px;margin-bottom:8px;letter-spacing:.03em;}
textarea.output:focus{outline:none;border-color:var(--gold);}
.errbox{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:8px;}
.err-title{font-family:var(--mono);color:var(--gold);font-size:12px;letter-spacing:.2em;}
.err-msg{font-size:10px;color:var(--muted);line-height:1.6;word-break:break-word;max-width:100%;}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:40px 0;color:var(--gold);font-family:var(--mono);flex:1;}
.loading .lbl{font-size:11px;letter-spacing:.3em;}
@keyframes blink{0%,80%,100%{opacity:.12}40%{opacity:1}}
.dot{animation:blink 1.4s infinite both;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes spin{to{transform:rotate(360deg);}}
.reel{animation:spin 2.4s linear infinite;}
footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--edge);text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="kicker">🦅 THE LADYHAWKES — CONTENT FACTORY</div>
      <h1>THE LADYHAWKES</h1>
      <div class="sub">MELODIC HARD ROCK · 80s AOR</div>
    </div>

      <div class="archive-zone">
        <button id="archiveBtn" class="btn-outline" style="padding:8px 14px;font-size:11px;">▾ ARCHIVE (<span id="archiveCount">0</span>)</button>
        <div id="archivePanel" class="archive-panel"></div>
      </div>
    </div>
  </header>

  <section class="panel">
    <div class="grid2">
      <div class="full">
        <label>TRACK TYPE</label>
        <select id="trackType" class="field">
          <option value="power_ballad">Power Ballad — slow, emotional, dramatic</option>
          <option value="arena_anthem">Arena Anthem — fast, powerful, electrifying</option>
          <option value="sleaze_rock">Sleaze Rock — mid-tempo, raw, attitude-driven</option>

      </div>
      <div class="full">

        <textarea id="theme" class="field" rows="2" maxlength="200" placeholder="ex: amor impossível entre o dia e a noite · a maldição que os separa · eclipse, gaviões e lobos"></textarea>
      </div>
      <div class="full">
        <label>ANTHROPIC API KEY <span class="dim">· stored locally only</span></label>

          <input id="apikey" class="field mono" type="password" placeholder="sk-ant-..." autocomplete="off"/>
          <button id="toggleKey" class="ghostbtn" type="button">SHOW</button>
        </div>
      </div>
    </div>
    <div class="actions">
      <button id="generateBtn" class="btn-primary">▶ GENERATE ALL</button>
      <button id="exportBtn" class="btn-outline" disabled>↓ EXPORT .TXT</button>
    </div>
  </section>

  <section class="panel" id="queueSection">
    <label>FILA DE PRODUÇÃO <span class="dim">· 1 tema por linha · prefixo opcional [PB] [AA] [SR]</span></label>
    <textarea id="queueInput" class="field" rows="4" placeholder="[PB] amor impossível entre o dia e a noite&#10;[AA] defying the curse at dawn&#10;[SR] night roads and the scent of leather&#10;eclipse sobre o castelo — maldição eterna"></textarea>
    <div class="actions">
      <button id="queueLoadBtn" class="btn-outline">⊕ CARREGAR FILA</button>
      <button id="queueNextBtn" class="btn-primary" disabled>▶ GERAR PRÓXIMO DA FILA</button>
      <button id="queueClearBtn" class="btn-outline" style="flex:0 0 auto;">LIMPAR</button>
    </div>
    <div id="queueList" class="queue-list"></div>
  </section>

  <div id="tabbar" class="tabbar"></div>
  <section id="cards"></section>

  <footer>The Ladyhawkes — Fly Into the Night &nbsp;·&nbsp; MODEL: <span id="modelLabel"></span></footer>
</div>

function buildBandRefs(cfg){
  if(!cfg||!cfg.members) return '';
  return "BAND MEMBER REFERENCES — use [Name] in scene prompts (Flow replaces with saved reference image):\n"+

var state = { outputs:{}, busy:false };
GENERATORS.forEach(function(g){ state.outputs[g.id]={ status:'idle',text:'',error:'' }; });
var currentEntryId = null;

/* ---------- helpers ---------- */
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function sanitize(s){ return (s||'untitled').replace(/[^a-z0-9]+/gi,'_').replace(/^_+|_+$/g,'')||'untitled'; }
function lsGetJSON(k){ try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch(e){ return []; } }
function lsSetJSON(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
function loadArchive(){ return lsGetJSON(LS_ARCHIVE); }
function saveArchive(a){ lsSetJSON(LS_ARCHIVE,a); }
function genById(id){ return GENERATORS.filter(function(g){ return g.id===id; })[0]; }
function depList(g){ return Array.isArray(g.dependsOn)?g.dependsOn:(g.dependsOn?[g.dependsOn]:[]); }

function getForm(){
  var tt = getTrackInfo();
  return {
    trackType:     tt ? tt.label   : $('trackType').value,
    trackTypeId:   tt ? tt.id      : $('trackType').value,
    mood:          tt ? tt.mood    : '',
    bpmRange:      tt ? tt.bpm_range     : '',
    lyricThemesPool: tt ? (tt.lyric_themes||[]).join('; ') : '',
    sunoStyleBase: tt ? tt.suno_style    : '',
    sceneSuffix:   tt ? tt.scene_suffix  : '1980s melodic hard rock aesthetics, photorealistic, high detail, sharp focus, no text, no watermark',
    negativePrompt:tt ? tt.negative_prompt : 'nudity, naked, pornographic, text, watermark',
    theme: $('theme').value.trim()
  };
}

function buildDepSnapshot(form,deps){
  var snap={}; for(var k in form) snap[k]=form[k];
  deps.forEach(function(d){
    var dep=state.outputs[d]; var val=(dep&&dep.status==='done')?dep.text:'';
    if(d==='title'){ if(val) snap.title=val; }
    else if(d==='lyrics') snap.lyrics=val;
  });
  return snap;
}

    method:'POST',
    headers:{'content-type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({ model:MODEL, max_tokens:4096, temperature:1, system:system, messages:[{role:'user',content:user}] })
  }).then(function(res){
    if(!res.ok) return res.text().then(function(t){
      var detail=t; try{ var j=JSON.parse(t); detail=(j.error&&j.error.message)||t; }catch(e){}
      throw new Error('HTTP '+res.status+' — '+detail);
    });
    return res.json();
  }).then(function(data){
    return (data.content||[]).filter(function(b){ return b.type==='text'; }).map(function(b){ return b.text; }).join('').trim();
  });
}

/* ---------- run one generator ---------- */
var LOADING_HTML =
  '<div class="loading">'+
    '<svg class="reel" width="34" height="34" viewBox="0 0 34 34" fill="none">'+
      '<circle cx="17" cy="17" r="15" stroke="var(--gold)" stroke-width="1.5" opacity="0.5"/>'+
      '<circle cx="17" cy="17" r="4" stroke="var(--gold)" stroke-width="1.5"/>'+
      '<line x1="17" y1="2" x2="17" y2="8" stroke="var(--gold)" stroke-width="1.5"/>'+
      '<line x1="17" y1="26" x2="17" y2="32" stroke="var(--gold)" stroke-width="1.5"/>'+
      '<line x1="2" y1="17" x2="8" y2="17" stroke="var(--gold)" stroke-width="1.5"/>'+
      '<line x1="26" y1="17" x2="32" y2="17" stroke="var(--gold)" stroke-width="1.5"/>'+
    '</svg>'+
    '<div class="lbl">— GENERATING <span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>'+
  '</div>';

function runOne(gen,snapshot){
  state.outputs[gen.id]={ status:'loading',text:'',error:'' };
  renderCard(gen.id);

  if(typeof gen.compute==='function'){
    try{ state.outputs[gen.id]={ status:'done',text:gen.compute(snapshot),error:'' }; }
    catch(e){ state.outputs[gen.id]={ status:'error',text:'',error:(e&&e.message)||String(e) }; }
    renderCard(gen.id); updateExportState();
    return Promise.resolve(state.outputs[gen.id].text||null);
  }

  var apiKey=$('apikey').value.trim();
  var extra=[];
  if(gen.memberInject && BAND_REFS) extra.push(BAND_REFS);
  extra.push(GUARDRAILS);
  var sys=gen.system+"\n\n"+extra.join("\n\n");

  return callAnthropic(apiKey,sys,gen.user(snapshot)).then(function(raw){
    var text=raw;
    if(typeof gen.clean==='function') text=gen.clean(text);
    if(contentSafetyFlag(text)){
      state.outputs[gen.id]={ status:'error',text:'',error:'[ CONTENT BLOCKED — regenerate ]' };
      renderCard(gen.id); return null;
    }
    state.outputs[gen.id]={ status:'done',text:text,error:'' };
    renderCard(gen.id); updateExportState();
    return text;
  }).catch(function(err){
    state.outputs[gen.id]={ status:'error',text:'',error:(err&&err.message)||String(err) };
    renderCard(gen.id); return null;
  });
}

/* ---------- generate all (DAG) ---------- */
function generateAll(onDone){
  if(state.busy) return;
  var apiKey=$('apikey').value.trim();
  if(!apiKey){ alert('SEM CHAVE DE API — cole sua chave da Anthropic antes de gerar.'); return; }
  var form=getForm();
  if(!form.theme){ alert('Informe o THEME / MOOD antes de gerar.'); return; }

  state.busy=true; setBusy(true);
  var proms={};
  function promiseFor(g){
    if(proms[g.id]) return proms[g.id];
    var deps=depList(g);
    if(deps.length){ state.outputs[g.id]={ status:'loading',text:'',error:'' }; renderCard(g.id); }
    var waitFor=deps.map(function(id){ return promiseFor(genById(id)); });
    proms[g.id]=Promise.all(waitFor).then(function(){ return runOne(g,buildDepSnapshot(form,deps)); });
    return proms[g.id];
  }
  Promise.all(GENERATORS.map(function(g){ return promiseFor(g); })).then(function(){
    state.busy=false; setBusy(false); updateExportState();
    if(!form.title && state.outputs['title']&&state.outputs['title'].status==='done') form.title=state.outputs['title'].text;
    archiveCurrent(form);
    if(typeof onDone==='function') onDone();
  });
}

function regenOne(id){
  var apiKey=$('apikey').value.trim();
  if(!apiKey){ alert('SEM CHAVE DE API — cole sua chave da Anthropic primeiro.'); return; }
  var form=getForm();
  if(!form.theme){ alert('Informe o THEME / MOOD.'); return; }
  var gen=genById(id);
  runOne(gen,buildDepSnapshot(form,depList(gen))).then(function(){ updateExportState(); updateCurrentArchiveOutput(id); });
}

/* ---------- auto-fix lyrics (from review) ---------- */
var FIXSYS =
"You are a lyric editor for The Ladyhawkes — a fictional 1980s all-female melodic hard rock / AOR band inspired by the 1985 film Ladyhawke.\n\n"+
"You receive the current LYRICS and a REVIEW REPORT (the report may be partly in Portuguese and use ✅⚠️❌ symbols). Rewrite the lyrics so every issue the review raised is fixed — especially: the bridge must open on a concrete hawk-body/wolf-body physical action; broken English idiom (e.g. 'reclaim back', 'bear tears', 'outlast the day', stacked prepositions); a weak outro; and any stock/cliché phrases.\n\n"+
"PRESERVE what already works: keep the exact metatag structure ([Intro], [Verse 1], [Pre-Chorus], [Chorus], [Bridge], [Guitar Solo], [Outro]) and tone tags ([Whispered]/[Belted]/etc.), and keep the strong lines the review praised. Change only what needs changing.\n\n"+
"Every verse and chorus line must still contain a named concrete object, a body-specific physical sensation, OR a time measurement as a concrete noun. Every bridge image must trace back to a word already used in the verses. The outro must match or exceed the strongest line in the song.\n\n"+
"LANGUAGE — ENGLISH ONLY. Output ONLY the corrected lyrics, starting immediately with [Intro]. No preamble, no notes, no explanation of the changes.";

function fixLyrics(){
  var apiKey=$('apikey').value.trim();
  if(!apiKey){ alert('SEM CHAVE DE API — cole sua chave da Anthropic primeiro.'); return; }
  var lyr=state.outputs['lyrics'], rev=state.outputs['lyricsReview'];
  if(!lyr||lyr.status!=='done'||!lyr.text){ alert('Gere a LETRA antes de corrigir.'); return; }
  if(!rev||rev.status!=='done'||!rev.text){ alert('Gere a LYRICS REVIEW antes de corrigir automaticamente.'); return; }
  var lyricsGen=genById('lyrics');
  var original=lyr.text;
  state.outputs['lyrics']={ status:'loading',text:'',error:'' };
  renderCard('lyrics'); renderCard('lyricsReview'); setActiveTab('suno');
  var user="LYRICS:\n"+original+"\n\nREVIEW REPORT:\n"+rev.text;
  callAnthropic(apiKey, FIXSYS+"\n\n"+GUARDRAILS, user).then(function(raw){
    var text=(typeof lyricsGen.clean==='function')?lyricsGen.clean(raw):raw;
    if(!text || contentSafetyFlag(text)){
      state.outputs['lyrics']={ status:'done',text:original,error:'' };
      renderCard('lyrics'); renderCard('lyricsReview');
      alert('Correção não aplicada (vazia ou bloqueada pelo filtro). Letra original mantida.'); return;
    }
    state.outputs['lyrics']={ status:'done',text:text,error:'' };
    renderCard('lyrics'); updateExportState(); updateCurrentArchiveOutput('lyrics');
    return runOne(genById('lyricsReview'),buildDepSnapshot(getForm(),['lyrics'])).then(function(){
      updateExportState(); updateCurrentArchiveOutput('lyricsReview');
    });
  }).catch(function(err){
    state.outputs['lyrics']={ status:'done',text:original,error:'' };
    renderCard('lyrics'); renderCard('lyricsReview');
    alert('Falha ao corrigir a letra: '+((err&&err.message)||err)+'\nLetra original mantida.');
  });
}

function setBusy(b){
  var btn=$('generateBtn');
  btn.disabled=b; btn.textContent=b?'— GENERATING . . .':'▶ GENERATE ALL';
  var qb=$('queueNextBtn');
  if(qb) qb.disabled=b||!queue.some(function(q){ return q.status==='pending'; });
}
function updateExportState(){
  var any=GENERATORS.some(function(g){ return state.outputs[g.id].status==='done'; });
  $('exportBtn').disabled=state.busy||!any;
}

/* ---------- archive ---------- */
function archiveCurrent(form){
  var map={}; var ok=false;
  GENERATORS.forEach(function(g){ var st=state.outputs[g.id]; map[g.id]=(st.status==='done')?st.text:''; if(map[g.id]) ok=true; });
  if(!ok) return;
  var entry={ id:Date.now(), title:form.title||'', trackType:form.trackType||'', theme:form.theme, form:form, outputs:map };
  var arr=loadArchive(); arr.unshift(entry); arr=arr.slice(0,25); saveArchive(arr);
  currentEntryId=entry.id; renderArchive();
}
function updateCurrentArchiveOutput(genId){
  if(!currentEntryId) return;
  var st=state.outputs[genId]; if(!st||st.status!=='done') return;
  var arr=loadArchive();
  for(var i=0;i<arr.length;i++){
    if(String(arr[i].id)===String(currentEntryId)){ arr[i].outputs[genId]=st.text; saveArchive(arr); renderArchive(); return; }
  }
}
function renderArchive(){
  var arr=loadArchive();
  $('archiveCount').textContent=arr.length;
  var panel=$('archivePanel');
  if(!arr.length){ panel.innerHTML='<div class="archive-empty">— empty —</div>'; return; }
  var html='';
  arr.forEach(function(e){
    var when=new Date(e.id).toLocaleString();
    var label=e.title||e.theme||'—';
    html+='<button class="archive-item" data-eid="'+e.id+'"><div class="t">'+esc(label)+'</div><div class="m">'+esc(e.trackType||'')+'  ·  '+esc(when)+'</div></button>';
  });
  html+='<button class="archive-clear" id="archiveClearBtn">LIMPAR ARCHIVE</button>';
  panel.innerHTML=html;
}
function loadEntry(entry){
  if(!entry) return;
  currentEntryId=entry.id;
  if(entry.form){
    var tt=$('trackType'); for(var i=0;i<tt.options.length;i++){
      if(tt.options[i].value===entry.form.trackTypeId){ tt.selectedIndex=i; break; }
    }
    if(entry.form.theme) $('theme').value=entry.form.theme;
    updateThemeCount();
  }
  GENERATORS.forEach(function(g){
    var text=(entry.outputs&&entry.outputs[g.id])||'';
    state.outputs[g.id]=text?{ status:'done',text:text,error:'' }:{ status:'idle',text:'',error:'' };
    renderCard(g.id);
  });
  updateExportState();
  setActiveTab('suno');
  $('archivePanel').classList.remove('open');
}

/* ---------- render cards ---------- */
function cardMarkup(g,i){
  var num=String(i+1).padStart(2,'0');
  return '<div class="card" id="card-'+g.id+'">'+
    '<div class="card-head">'+
      '<div><div class="card-title"><span class="num">'+num+'</span>'+esc(g.label)+'</div><div class="card-sub">'+esc(g.sub||'')+'</div></div>'+
      '<div class="card-actions" id="act-'+g.id+'"></div>'+
    '</div>'+
    '<div class="card-body" id="body-'+g.id+'"></div>'+
    '</div>';
}
function buildCards(){
  $('tabbar').innerHTML=TABS.map(function(t,i){
    return '<button class="tab'+(i===0?' active':'')+'" data-tab="'+t.id+'">'+esc(t.label)+'</button>';
  }).join('');
  var panels='';
  TABS.forEach(function(t,ti){
    var cards='';
    GENERATORS.forEach(function(g,i){ if(TAB_OF[g.id]===t.id) cards+=cardMarkup(g,i); });
    panels+='<div class="tabpanel cards'+(ti===0?'':' hidden')+'" data-panel="'+t.id+'">'+cards+'</div>';
  });
  $('cards').innerHTML=panels;
  GENERATORS.forEach(function(g){ renderCard(g.id); });
}
function setActiveTab(id){
  var bar=$('tabbar'),cont=$('cards');
  if(bar) Array.prototype.forEach.call(bar.querySelectorAll('.tab'),function(b){ b.classList.toggle('active',b.dataset.tab===id); });
  if(cont) Array.prototype.forEach.call(cont.querySelectorAll('.tabpanel'),function(p){ p.classList.toggle('hidden',p.dataset.panel!==id); });
}
function renderCard(id){
  var st=state.outputs[id];
  var act=$('act-'+id), body=$('body-'+id);
  if(!act||!body) return;
  var a='';
  if(st.status==='done'){
    a+='<button class="minibtn" data-action="regen" data-id="'+id+'">↻ REGEN</button>';
    if(id==='lyricsReview' && state.outputs['lyrics'] && state.outputs['lyrics'].status==='done'){
      a+='<button class="minibtn" data-action="fix" data-id="lyrics">⟳ CORRIGIR AUTO</button>';
    }
    a+='<button class="minibtn" data-action="copy" data-id="'+id+'">COPY</button>';
  } else {
    a+='<button class="minibtn" data-action="copy" data-id="'+id+'" disabled>COPY</button>';
  }
  act.innerHTML=a;
  if(st.status==='idle'){
    body.innerHTML='<div class="placeholder">· aguardando geração ·</div>';
  } else if(st.status==='loading'){
    body.innerHTML=LOADING_HTML;
  } else if(st.status==='error'){
    body.innerHTML='<div class="errbox"><div class="err-title">[ ERROR ]</div><div class="err-msg">'+esc(st.error)+'</div>'+
      '<button class="btn-outline" style="font-size:11px;padding:8px 18px;" data-action="retry" data-id="'+id+'">↻ RETRY</button></div>';
  } else if(st.status==='done'){
    body.innerHTML='<textarea class="output" readonly spellcheck="false"></textarea>';
    body.querySelector('textarea').value=st.text;
  }
}

/* ---------- copy / export ---------- */
function copyText(id){
  var st=state.outputs[id]; if(!st||st.status!=='done'||!st.text) return;
  var btn=document.querySelector('[data-action="copy"][data-id="'+id+'"]');
  function flash(){ if(btn){ btn.classList.add('on'); btn.textContent='COPIED ✓'; setTimeout(function(){ btn.classList.remove('on'); btn.textContent='COPY'; },1400); } }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(st.text).then(flash,function(){ fallbackCopy(st.text); flash(); }); }
  else { fallbackCopy(st.text); flash(); }
}
function fallbackCopy(text){
  var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select(); try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}
function exportTxt(){
  var form=getForm();
  var genTitle=(state.outputs['title']&&state.outputs['title'].status==='done')?state.outputs['title'].text.trim():'';
  var title=form.title||genTitle||'Untitled';
  var L=new Array(65).join('='), T=new Array(65).join('-');
  var out='';
  out+=L+'\n  THE LADYHAWKES — CONTENT PACK\n'+L+'\n';
  out+='Track Type: '+form.trackType+'\n';
  out+='Title:      '+title+'\n';
  out+='Theme:      '+(form.theme||'—')+'\n';
  out+='Generated:  '+new Date().toISOString()+'\n\n';
  GENERATORS.forEach(function(g,i){
    var st=state.outputs[g.id];
    out+=T+'\n  ['+(i+1)+'] '+g.label+'\n'+T+'\n';
    out+=((st.status==='done'&&st.text)?st.text:'(not generated)')+'\n\n';
  });
  var blob=new Blob([out],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url;
  a.download=sanitize(title)+'_content_pack.txt';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ---------- production queue ---------- */
var queue=[];
function loadQueueState(){ queue=lsGetJSON(LS_QUEUE)||[]; }
function saveQueueState(){ lsSetJSON(LS_QUEUE,queue); }
var TYPE_MAP={ 'PB':'power_ballad','AA':'arena_anthem','SR':'sleaze_rock' };
function parseQueueLine(raw){
  var line=(raw||'').trim(); if(!line) return null;
  var m=line.match(/^\[(PB|AA|SR)\]\s*/i);
  if(m){ return { theme:line.slice(m[0].length).trim(), trackTypeId:TYPE_MAP[m[1].toUpperCase()]||null, typeCode:m[1].toUpperCase() }; }
  return { theme:line, trackTypeId:null, typeCode:null };
}
function loadQueueFromInput(){
  var lines=$('queueInput').value.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s.length; });
  if(!lines.length){ alert('Cole pelo menos um tema na fila (1 por linha).'); return; }
  queue=lines.map(function(raw){ var p=parseQueueLine(raw); return p?Object.assign(p,{status:'pending'}):null; }).filter(Boolean);
  saveQueueState(); renderQueue();
}
function clearQueue(){ queue=[]; $('queueInput').value=''; saveQueueState(); renderQueue(); }
function renderQueue(){
  var el=$('queueList'); if(!el) return;
  if(!queue.length){ el.innerHTML=''; var b=$('queueNextBtn'); if(b){ b.disabled=true; b.textContent='▶ GERAR PRÓXIMO DA FILA'; } return; }
  var done=queue.filter(function(q){ return q.status==='done'; }).length;
  el.innerHTML=queue.map(function(q){
    var scls=q.status==='done'?'done':(q.status==='running'?'current':'pending');
    var lbl=q.status==='done'?'✓ feito':(q.status==='running'?'▶ gerando':'⏳ pendente');
    var badge=q.typeCode?'<span class="qtype">'+esc(q.typeCode)+'</span>':'';
    return '<div class="queue-item '+(scls==='pending'?'':scls)+'"><span class="qstatus '+scls+'">'+lbl+'</span>'+badge+'<span class="qtheme">'+esc(q.theme)+'</span></div>';
  }).join('');
  var remaining=queue.filter(function(q){ return q.status==='pending'; }).length;
  var btn=$('queueNextBtn');
  if(btn){ btn.disabled=state.busy||remaining===0; btn.textContent=remaining?('▶ GERAR PRÓXIMO ('+done+'/'+queue.length+')'):('✓ FILA COMPLETA ('+queue.length+'/'+queue.length+')'); }
}
function generateQueueNext(){
  if(state.busy) return;
  if(!$('apikey').value.trim()){ alert('SEM CHAVE DE API — cole sua chave da Anthropic antes de gerar a fila.'); return; }
  var item=null;
  for(var i=0;i<queue.length;i++){ if(queue[i].status==='pending'){ item=queue[i]; break; } }
  if(!item){ alert('Fila completa — cada música gerada está no ARCHIVE.'); return; }
  $('theme').value=item.theme;
  if(item.trackTypeId){
    var sel=$('trackType');
    for(var vi=0;vi<sel.options.length;vi++){ if(sel.options[vi].value===item.trackTypeId){ sel.selectedIndex=vi; break; } }
  }
  updateThemeCount();
  item.status='running'; saveQueueState(); renderQueue();
  setActiveTab('suno');
  generateAll(function(){ item.status='done'; saveQueueState(); renderQueue(); });
}

/* ---------- theme + light ---------- */
function updateThemeCount(){
  var v=$('theme').value.length, mx=200;
  var el=$('themeCount'); if(!el) return;
  el.textContent=v+'/'+mx; el.classList.toggle('max',v>=mx);
}
function applyTheme(t){
  document.documentElement.classList.toggle('light',t==='light');
  var btn=$('themeBtn'); if(btn) btn.textContent=t==='light'?'☾ ESCURO':'☀ CLARO';
  try{ localStorage.setItem(LS_THEME,t); }catch(e){}
}

/* ---------- init ---------- */
function init(){
  $('modelLabel').textContent=MODEL;
  loadBandConfig();
  loadTrackConfig();

  var savedKey=localStorage.getItem(LS_KEY); if(savedKey) $('apikey').value=savedKey;
  var savedTheme=localStorage.getItem(LS_THEME)||'dark'; applyTheme(savedTheme);
  loadQueueState(); renderQueue();
  buildCards();
  renderArchive();

  $('apikey').addEventListener('input',function(){ localStorage.setItem(LS_KEY,this.value); });
  $('toggleKey').addEventListener('click',function(){
    var f=$('apikey'); f.type=f.type==='password'?'text':'password'; this.textContent=f.type==='password'?'SHOW':'HIDE';
  });
  $('theme').addEventListener('input',updateThemeCount);
  $('themeBtn').addEventListener('click',function(){
    var now=document.documentElement.classList.contains('light')?'dark':'light'; applyTheme(now);
  });
  $('generateBtn').addEventListener('click',function(){ generateAll(); });
  $('exportBtn').addEventListener('click',exportTxt);
  $('queueLoadBtn').addEventListener('click',loadQueueFromInput);
  $('queueNextBtn').addEventListener('click',generateQueueNext);
  $('queueClearBtn').addEventListener('click',clearQueue);

  $('archiveBtn').addEventListener('click',function(e){ e.stopPropagation(); $('archivePanel').classList.toggle('open'); });
  document.addEventListener('click',function(e){
    var panel=$('archivePanel'); if(!panel) return;
    var eid=e.target.dataset&&e.target.dataset.eid;
    if(eid){ var arr=loadArchive(); var entry=arr.filter(function(a){ return String(a.id)===eid; })[0]; if(entry) loadEntry(entry); return; }
    if(e.target.id==='archiveClearBtn'){ saveArchive([]); currentEntryId=null; renderArchive(); return; }
    if(!$('archiveBtn').contains(e.target)&&!panel.contains(e.target)) panel.classList.remove('open');
  });

  $('tabbar').addEventListener('click',function(e){
    var btn=e.target.closest('.tab'); if(!btn) return;
    setActiveTab(btn.dataset.tab);
  });

  $('cards').addEventListener('click',function(e){
    var btn=e.target.closest('[data-action]'); if(!btn) return;
    var action=btn.dataset.action, id=btn.dataset.id;
    if(action==='copy') copyText(id);
    if(action==='regen'||action==='retry') regenOne(id);
    if(action==='fix') fixLyrics();
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
